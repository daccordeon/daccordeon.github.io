# about_title: About Me
about_profile_image: images/profile.jpg
about_content: | # this will include new lines to allow paragraphs
  Hi, I'm James! I'm a physics postdoctoral fellow at the University of Chicago (UChicago). I completed my PhD at the Australian National University (ANU) and spent a few years visiting Caltech as part of my PhD research with LIGO.

  My research interests include <mark>quantum metrology</mark>, <mark>quantum computation</mark>, <mark>gravitational waves</mark>, and <mark>quantum gravity</mark>. I enjoy discovering a simple understanding of physical phenomena from intuitive analytic models. I believe in Open Research and Open Source. My full CV is available upon request and I include highlights below.

  My current office is the antechamber: Room 289, William Eckhardt Research Center (ERC). Do drop in!

content:
  - title: Employment # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: University of Chicago (UChicago)
        caption: 2025 - present
        sub_title: Postdoctoral Scholar
        description: | # this will include new lines to allow paragraphs
          I currently hold the Chicago Prize Postdoctoral Fellowship in Theoretical Quantum Science at UChicago. I started this position in September 2025. My research is at the interface between quantum sensing and quantum computation.

      - layout: left
        title: Australian National University (ANU)
        caption: 2022
        sub_title: Research Officer Grade 5/6
        description: | # this will include new lines to allow paragraphs
          I worked as a research assistant at CGA on benchmarking future gravitational-wave detector networks to assess the science case for a detector in Australia. The associated paper is available [here](https://journals.aps.org/prd/abstract/10.1103/PhysRevD.108.123026).

      - layout: left
        title: Australian National University (ANU)
        caption: 2020, 2021
        sub_title: Summer Research Intern
        description: | # this will include new lines to allow paragraphs
          Over two summers at CGA, I worked on analytic and numerical modelling of quantum optics configurations for squeezing in LIGO and experimental optics work in the CGA GW Laboratory into tilt-locking.

  - title: Education # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: right
        title: Australian National University (ANU)
        caption: 2022 - 2025
        sub_title: Doctor of Philosophy (PhD) in Physics
        description: | # this will include new lines to allow paragraphs
          I completed a Physics PhD at ANU from June 2022 to August 2025. I was supervised by Joe Hope and Simon Haine at ANU and by Yanbei Chen on an three-year visit to Caltech as a Visiting Special Student. My research involved theoretical work in precision metrology for gravitational-wave detectors. My PhD thesis is available [here](https://hdl.handle.net/1885/733767240).

      - layout: right
        title: Australian National University (ANU)
        caption: 2018 - 2021
        sub_title: Bachelor of Philosophy (Honours) in Science with First Class Honours in Physics
        description: | # this will include new lines to allow paragraphs
          The Bachelor of Philosophy (Honours) in Science is an advanced science degree offered at ANU which includes undergraduate research and a great freedom in course selection. During my undergraduate time at ANU, I enjoyed learning through asking many fruitful questions and found good company and help from my peers.

          In my final Honours year, I explored a different way to use quantum squeezing to improve the sensitivity of gravitational-wave detectors (called <mark>Nondegenerate Internal Squeezing</mark>). The associated paper is available [here](https://doi.org/10.1103/PhysRevD.106.L041101). My First Class Honours thesis is available [here](http://hdl.handle.net/1885/256029).
                   
